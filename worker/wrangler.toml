name = "sigmund-api"
main = "index.js"
compatibility_date = "2025-07-01"

[build]
command = ""

[site]
bucket = ""

[[kv_namespaces]]
binding = "SESSIONS"
id = "YOUR_KV_ID_HERE"
preview_id = "YOUR_KV_PREVIEW_ID_HERE"

[vars]
DEEPSEEK_MODEL = "deepseek/deepseek-v4-flash"
QWEN_MODEL = "qwen/qwen-3.5-122b"
GLM_MODEL = "zhipu/glm-5.2"
PRIMARY_MODEL = "deepseek/deepseek-v4-flash"
FALLBACK_MODEL = "qwen/qwen-3.5-122b"
SECOND_FALLBACK_MODEL = "zhipu/glm-5.2"
GOOGLE_CLIENT_ID = "YOUR_GOOGLE_CLIENT_ID_HERE"

# Chaves sensíveis: configurar via `wrangler secret put NOME`
# Ex: wrangler secret put STRIPE_SECRET_KEY
